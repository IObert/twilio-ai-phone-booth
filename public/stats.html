<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Twilio Stats Dashboard</title>
<style>
  :root {
    --bg: #0d0d12;
    --panel: #161622;
    --panel2: #1e1e2e;
    --accent: #7c5cfc;
    --accent2: #e8a838;
    --green: #3ecf8e;
    --yellow: #f5c842;
    --red: #ff4d6d;
    --text: #f0eef8;
    --muted: #8b88a8;
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(140px);
    opacity: 0.10;
    pointer-events: none;
  }
  .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -160px; right: -100px; }
  .blob-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -120px; left: -80px; }

  header {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 20px 48px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    background: var(--panel);
    position: relative;
    z-index: 1;
  }
  .header-icon { font-size: 30px; }
  .header-title { font-size: 22px; font-weight: 800; }
  .header-sub { font-size: 13px; color: var(--muted); margin-top: 1px; }
  .refresh-btn {
    margin-left: auto;
    padding: 8px 20px;
    border-radius: 50px;
    background: rgba(124,92,252,0.15);
    border: 1px solid rgba(124,92,252,0.35);
    color: var(--accent);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .refresh-btn:hover { background: rgba(124,92,252,0.25); }

  main {
    flex: 1;
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 48px;
    display: flex;
    flex-direction: column;
    gap: 32px;
    position: relative;
    z-index: 1;
  }

  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* ── KPI grid ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
  }
  .kpi-card {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: var(--radius);
    padding: 28px 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    opacity: 0;
    transform: translateY(14px);
    animation: up 0.45s ease forwards;
  }
  .kpi-card:nth-child(1) { animation-delay: 0.05s; }
  .kpi-card:nth-child(2) { animation-delay: 0.10s; }
  .kpi-card:nth-child(3) { animation-delay: 0.15s; }
  .kpi-card:nth-child(4) { animation-delay: 0.20s; }
  .kpi-card:nth-child(5) { animation-delay: 0.25s; }
  .kpi-card:nth-child(6) { animation-delay: 0.30s; }
  .kpi-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; }
  .kpi-value {
    font-size: 42px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), #a07cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1.1;
  }
  .kpi-unit { font-size: 13px; color: var(--muted); }

  /* ── sentiment panel ── */
  .bottom-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .panel-card {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: var(--radius);
    padding: 28px 32px;
    opacity: 0;
    transform: translateY(14px);
    animation: up 0.45s ease 0.35s forwards;
  }

  /* sentiment bar */
  .sentiment-bars { display: flex; flex-direction: column; gap: 12px; }
  .s-row { display: flex; align-items: center; gap: 12px; }
  .s-label { width: 76px; font-size: 13px; color: var(--muted); text-transform: capitalize; }
  .s-track {
    flex: 1;
    height: 10px;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    overflow: hidden;
  }
  .s-fill {
    height: 100%;
    border-radius: 10px;
    transition: width 0.8s cubic-bezier(0.22,1,0.36,1);
    width: 0%;
  }
  .s-fill.positive { background: var(--green); }
  .s-fill.neutral  { background: var(--yellow); }
  .s-fill.negative { background: var(--red); }
  .s-count { width: 32px; text-align: right; font-size: 13px; font-weight: 600; }

  /* donut */
  .donut-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 32px;
  }
  .donut-svg { flex-shrink: 0; }
  .donut-legend { display: flex; flex-direction: column; gap: 10px; }
  .legend-item { display: flex; align-items: center; gap: 10px; font-size: 14px; }
  .legend-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }

  @keyframes up { to { opacity: 1; transform: none; } }

  .loading-state { color: var(--muted); font-style: italic; font-size: 14px; }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<header>
  <div class="header-icon" id="headerIcon">…</div>
  <div>
    <div class="header-title" id="headerTitle">Twilio — Olivia</div>
    <div class="header-sub">Stats Dashboard</div>
  </div>
  <button class="refresh-btn" onclick="loadStats()">↻ Refresh</button>
</header>

<main>
  <div>
    <div class="section-label">Key Metrics</div>
    <div class="kpi-grid" id="kpiGrid">
      <div class="loading-state">Loading…</div>
    </div>
  </div>

  <div class="bottom-row" id="bottomRow" style="display:none">
    <div class="panel-card">
      <div class="section-label">Sentiment Distribution</div>
      <div class="sentiment-bars" id="sentimentBars"></div>
    </div>
    <div class="panel-card">
      <div class="section-label">Sentiment Breakdown</div>
      <div class="donut-wrap">
        <svg class="donut-svg" width="140" height="140" viewBox="0 0 140 140" id="donutSvg"></svg>
        <div class="donut-legend" id="donutLegend"></div>
      </div>
    </div>
  </div>
</main>

<script>
const COLORS = { positive: '#3ecf8e', neutral: '#f5c842', negative: '#ff4d6d', unknown: '#8b88a8' };
const ICONS  = { positive: '😊', neutral: '😐', negative: '😟', unknown: '❓' };

function pct(val) { return (val * 100).toFixed(1) + '%'; }
function fmt(secs) {
  if (!secs) return '—';
  const m = Math.floor(secs / 60), s = Math.round(secs % 60);
  return m > 0 ? `${m}m ${s}s` : `${s}s`;
}

async function loadStats() {
  document.getElementById('kpiGrid').innerHTML = '<div class="loading-state">Loading…</div>';
  document.getElementById('bottomRow').style.display = 'none';

  const res = await fetch('/api/stats');
  if (!res.ok) { document.getElementById('kpiGrid').innerHTML = '<div class="loading-state">Failed to load stats.</div>'; return; }
  const d = await res.json();

  // Update header icon and title based on drink type
  const dl = d.drinkLabel ?? 'drink';
  const dlCap = dl.charAt(0).toUpperCase() + dl.slice(1);
  document.getElementById('headerIcon').textContent = dl === 'smoothie' ? '🍹' : '☕';
  document.getElementById('headerTitle').textContent = `Twilio — Olivia (${dlCap}s)`;

  // KPI cards
  const kpis = [
    { label: 'Total Calls',              value: d.total,                  unit: 'calls' },
    { label: `${dlCap} Order Rate`,      value: pct(d.orderRate),         unit: `placed a ${dl} order` },
    { label: `${dlCap} Question Rate`,   value: pct(d.questionRate),      unit: `asked a ${dl} question` },
    { label: 'Both Tasks Completed',     value: pct(d.bothRate),          unit: 'completed both tasks' },
    { label: 'Avg. Messages / Call',     value: d.avgMessages.toFixed(1), unit: 'messages' },
    { label: 'Avg. Call Duration',       value: fmt(d.avgDuration),       unit: 'per completed call' },
  ];

  document.getElementById('kpiGrid').innerHTML = kpis.map(k => `
    <div class="kpi-card">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-unit">${k.unit}</div>
    </div>
  `).join('');

  // Sentiment bars
  const s = d.sentiment;
  const sTotal = s.positive + s.neutral + s.negative + s.unknown || 1;
  const order = ['positive', 'neutral', 'negative', 'unknown'];

  document.getElementById('sentimentBars').innerHTML = order.map(key => `
    <div class="s-row">
      <div class="s-label">${ICONS[key]} ${key}</div>
      <div class="s-track"><div class="s-fill ${key}" id="fill-${key}"></div></div>
      <div class="s-count">${s[key]}</div>
    </div>
  `).join('');

  // Animate bars after paint
  requestAnimationFrame(() => requestAnimationFrame(() => {
    order.forEach(key => {
      const el = document.getElementById(`fill-${key}`);
      if (el) el.style.width = ((s[key] / sTotal) * 100) + '%';
    });
  }));

  // Donut chart
  renderDonut(s, sTotal);

  document.getElementById('bottomRow').style.display = 'grid';
}

function renderDonut(s, total) {
  const cx = 70, cy = 70, r = 52, stroke = 22;
  const circumference = 2 * Math.PI * r;
  const order = ['positive', 'neutral', 'negative', 'unknown'];

  let offset = 0;
  const slices = order.map(key => {
    const frac = s[key] / total;
    const dash = frac * circumference;
    const gap  = circumference - dash;
    // rotate so slices start at top
    const rotation = offset * 360 - 90;
    offset += frac;
    return { key, dash, gap, rotation, count: s[key] };
  }).filter(sl => sl.count > 0);

  const svgSlices = slices.map(sl => `
    <circle
      cx="${cx}" cy="${cy}" r="${r}"
      fill="none"
      stroke="${COLORS[sl.key]}"
      stroke-width="${stroke}"
      stroke-dasharray="${sl.dash} ${sl.gap}"
      transform="rotate(${sl.rotation} ${cx} ${cy})"
      opacity="0.85"
    />
  `).join('');

  document.getElementById('donutSvg').innerHTML = svgSlices ||
    `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="${stroke}" />`;

  document.getElementById('donutLegend').innerHTML = slices.map(sl => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${COLORS[sl.key]}"></div>
      <span style="text-transform:capitalize">${sl.key}</span>
      <span style="color:var(--muted);margin-left:4px">${sl.count}</span>
    </div>
  `).join('');
}

loadStats();
</script>
</body>
</html>
