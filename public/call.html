<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Twilio Cafe — Live Call</title>
<style>
  :root {
    --bg: #0d0d12;
    --panel: #161622;
    --panel2: #1e1e2e;
    --accent: #7c5cfc;
    --accent2: #e8a838;
    --green: #3ecf8e;
    --red: #ff4d6d;
    --text: #f0eef8;
    --muted: #8b88a8;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, sans-serif;
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 300px 1fr 300px;
    grid-template-areas:
      "header header header"
      "left   feed   right"
      "footer footer footer";
    gap: 0;
    height: 100vh;
  }

  /* ── HEADER ────────────────────────────────────────────────── */
  header {
    grid-area: header;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 28px;
    background: var(--panel);
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .header-avatar { font-size: 32px; }
  .header-brand { font-size: 22px; font-weight: 800; }
  .header-sub { font-size: 13px; color: var(--muted); }
  .header-badge {
    margin-left: auto;
    padding: 6px 16px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 600;
    background: rgba(62,207,142,0.15);
    color: var(--green);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* ── SIDE PANELS ───────────────────────────────────────────── */
  .side-panel {
    padding: 20px 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
    border-right: 1px solid rgba(255,255,255,0.05);
  }
  #rightPanel { border-right: none; border-left: 1px solid rgba(255,255,255,0.05); }
  .panel-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  /* profile */
  .profile-name { font-size: 20px; font-weight: 700; }
  .badges { display: flex; flex-wrap: wrap; gap: 8px; }
  .badge {
    background: rgba(124,92,252,0.18);
    border: 1px solid rgba(124,92,252,0.4);
    color: var(--text);
    font-size: 13px;
    padding: 5px 12px;
    border-radius: 50px;
    opacity: 0;
    transform: scale(0.8);
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes popIn { to { opacity:1; transform: scale(1); } }

  /* tasks */
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--panel2);
    border-radius: var(--radius);
    padding: 14px;
    border: 1px solid rgba(255,255,255,0.06);
    transition: border-color 0.3s;
  }
  .task-item.done { border-color: rgba(62,207,142,0.4); }
  .task-item.optional { border-style: dashed; }
  .task-check {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--muted);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .task-item.done .task-check {
    background: var(--green);
    border-color: var(--green);
    transform: scale(1.1);
  }
  .task-label {
    font-size: 14px;
    line-height: 1.4;
    transition: all 0.3s;
  }
  .task-item.done .task-label {
    text-decoration: line-through;
    color: var(--muted);
  }
  .task-optional-tag {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-top: 3px;
  }

  /* ── FEED ──────────────────────────────────────────────────── */
  #feed {
    grid-area: feed;
    overflow-y: auto;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  /* chat bubbles */
  .msg { display: flex; gap: 10px; max-width: 75%; opacity: 0; transform: translateY(12px); animation: msgIn 0.3s ease forwards; }
  @keyframes msgIn { to { opacity:1; transform: none; } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.ai   { align-self: flex-start; }
  .msg-avatar { font-size: 22px; flex-shrink: 0; margin-top: 4px; }
  .msg-bubble {
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.5;
  }
  .msg.user .msg-bubble {
    background: rgba(124,92,252,0.22);
    border-radius: 18px 4px 18px 18px;
    text-align: right;
  }
  .msg.ai .msg-bubble {
    background: var(--panel2);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 4px 18px 18px 18px;
  }
  .msg-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }

  /* tool cards */
  .tool-card {
    align-self: center;
    background: var(--panel2);
    border: 1px solid rgba(232,168,56,0.35);
    border-radius: var(--radius);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    opacity: 0;
    transform: translateY(10px);
    animation: msgIn 0.3s ease forwards;
    max-width: 60%;
  }
  .tool-icon { font-size: 22px; }
  .tool-title { font-weight: 700; color: var(--accent2); font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
  .tool-detail { color: var(--muted); font-size: 13px; margin-top: 2px; }

  /* bookend */
  .bookend {
    align-self: center;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 10px 20px;
    border-radius: 50px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
  }

  /* ── VI panel ──────────────────────────────────────────────── */
  #viPanel {
    grid-area: feed;
    display: none;
    flex-direction: column;
    gap: 0;
    overflow: hidden;
  }
  #viPanel.open { display: flex; }
  #viClose {
    background: none;
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--text);
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    margin: 12px;
    align-self: flex-start;
  }
  #viIframe { flex: 1; border: none; background: #fff; border-radius: var(--radius) var(--radius) 0 0; }

  /* ── FOOTER ────────────────────────────────────────────────── */
  footer {
    grid-area: footer;
    padding: 14px 28px;
    background: var(--panel);
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 16px;
    min-height: 60px;
  }
  #viBtn {
    display: none;
    background: linear-gradient(135deg, var(--accent2), #f0c060);
    border: none;
    color: #000;
    font-size: 15px;
    font-weight: 700;
    padding: 10px 28px;
    border-radius: 50px;
    cursor: pointer;
    animation: popIn 0.4s ease forwards;
  }

</style>
</head>
<body>

<header>
  <div class="header-avatar">☕</div>
  <div>
    <div class="header-brand">Twilio Cafe</div>
    <div class="header-sub">AI Barista — Olivia</div>
  </div>
  <div class="header-badge" id="callStatus">
    <div class="dot"></div>
    <span>Connecting…</span>
  </div>
</header>

<!-- LEFT: Customer Profile -->
<div class="side-panel" id="leftPanel">
  <div class="panel-title">Customer Profile</div>
  <div class="profile-name" id="profileName">Guest</div>
  <div class="badges" id="badgeList"></div>
</div>

<!-- CENTER: Conversation Feed -->
<div id="feed"></div>
<div id="viPanel">
  <button id="viClose">← Back to conversation</button>
  <iframe id="viIframe" src="about:blank"></iframe>
</div>

<!-- RIGHT: Task Checklist -->
<div class="side-panel" id="rightPanel">
  <div class="panel-title">Your Tasks</div>
  <div class="task-item" id="task-question" data-done="false">
    <div class="task-check"></div>
    <div class="task-label">Ask a coffee question</div>
  </div>
  <div class="task-item" id="task-world-tour" data-done="false">
    <div class="task-check"></div>
    <div class="task-label">Guess a SIGNAL World Tour city</div>
  </div>
  <div class="task-item optional" id="task-order" data-done="false">
    <div class="task-check"></div>
    <div>
      <div class="task-label">Place a coffee order</div>
      <div class="task-optional-tag">Optional</div>
    </div>
  </div>
</div>

<footer>
  <span id="footerHint" style="color:var(--muted);font-size:14px;">Listening for conversation…</span>
  <button id="viBtn">See Voice Intelligence Analysis ✨</button>
</footer>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const CALL_SID = params.get('callSid') ?? '';

// ── State ──────────────────────────────────────────────────────────────────
let callEnded = false;
let viSid = null;
let renderedMessageCount = 0;

// ── Elements ───────────────────────────────────────────────────────────────
const feed = document.getElementById('feed');
const callStatus = document.getElementById('callStatus');
const profileName = document.getElementById('profileName');
const badgeList = document.getElementById('badgeList');
const viBtn = document.getElementById('viBtn');
const viPanel = document.getElementById('viPanel');
const viIframe = document.getElementById('viIframe');
const viClose = document.getElementById('viClose');
const footerHint = document.getElementById('footerHint');

// ── Helpers ────────────────────────────────────────────────────────────────
function scrollFeed() {
  setTimeout(() => feed.scrollTop = feed.scrollHeight, 50);
}

function setStatus(text, color) {
  callStatus.innerHTML = `<div class="dot" style="background:${color}"></div><span>${text}</span>`;
  callStatus.style.background = `${color}22`;
  callStatus.style.color = color;
}

function addMessage(role, text) {
  const isUser = role === 'user';
  const div = document.createElement('div');
  div.className = `msg ${isUser ? 'user' : 'ai'}`;
  div.innerHTML = `
    ${!isUser ? '<div class="msg-avatar">☕</div>' : ''}
    <div>
      <div class="msg-label">${isUser ? 'You' : 'Olivia'}</div>
      <div class="msg-bubble">${escHtml(text)}</div>
    </div>
  `;
  feed.appendChild(div);
  scrollFeed();
}

function addToolCard(data) {
  const card = document.createElement('div');
  card.className = 'tool-card';
  if (data.tool === 'order') {
    card.innerHTML = `
      <div class="tool-icon">🛒</div>
      <div>
        <div class="tool-title">Order Placed</div>
        <div class="tool-detail">${escHtml(String(data.item ?? ''))} ${data.modifiers?.length ? '· ' + data.modifiers.join(', ') : ''}</div>
        <div class="tool-detail">Order #${escHtml(String(data.orderNumber ?? ''))}</div>
      </div>`;
    markTask('task-order');
  } else if (data.tool === 'coffeeQuestion') {
    card.innerHTML = `
      <div class="tool-icon">✅</div>
      <div>
        <div class="tool-title">Question Answered</div>
        <div class="tool-detail">${escHtml(String(data.question ?? ''))}</div>
      </div>`;
    markTask('task-question');
  } else if (data.tool === 'worldTourGuess') {
    card.innerHTML = `
      <div class="tool-icon">🌍</div>
      <div>
        <div class="tool-title">World Tour Guessed</div>
        <div class="tool-detail">${escHtml(String(data.citiesGuessed ?? 0))} cities identified</div>
      </div>`;
    markTask('task-world-tour');
  } else if (data.tool === 'traitInferred') {
    card.innerHTML = `
      <div class="tool-icon">🏷️</div>
      <div>
        <div class="tool-title">Trait Inferred</div>
        <div class="tool-detail">${escHtml(String(data.trait ?? ''))}</div>
      </div>`;
  }
  feed.appendChild(card);
  scrollFeed();
}

function addBookend(text) {
  const div = document.createElement('div');
  div.className = 'bookend';
  div.textContent = text;
  feed.appendChild(div);
  scrollFeed();
}

function markTask(id) {
  const el = document.getElementById(id);
  if (!el || el.dataset.done === 'true') return;
  el.dataset.done = 'true';
  el.classList.add('done');
  el.querySelector('.task-check').textContent = '✓';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addBadge(text) {
  // avoid duplicates
  const existing = [...badgeList.querySelectorAll('.badge')].map(b => b.textContent);
  if (existing.includes(text)) return;
  const b = document.createElement('div');
  b.className = 'badge';
  b.textContent = text;
  badgeList.appendChild(b);
}

// ── Twilio Sync (status + history + tasks + viSid) ───────────────────────
async function initSync() {
  try {
    const tokenRes = await fetch('/api/getSyncToken', { method: 'POST' });
    const { token } = await tokenRes.json();
    const syncClient = new Twilio.Sync.Client(token);
    const map = await syncClient.map('callTracker');

    // Load initial state from the single item keyed by callSid
    const existing = await map.get(CALL_SID).catch(() => null);
    if (existing) {
      const d = existing.data;
      applyStatus(d.status);
      applyTaskState(d.tasks ?? {});
      applyHistory(d.history ?? []);
      applyViSid(d.viSid);
    }

    map.on('itemUpdated', ({ item }) => {
      if (item.key !== CALL_SID) return;
      applyStatus(item.data.status);
      applyTaskState(item.data.tasks ?? {});
      applyHistory(item.data.history ?? []);
      applyViSid(item.data.viSid);
    });
  } catch (err) {
    console.error('[initSync]', err);
  }
}

function applyStatus(data) {
  const value = data;
  if (value === 'in-progress') {
    setStatus('Live', 'var(--green)');
    footerHint.textContent = '';
  } else if (value === 'completed' && !callEnded) {
    callEnded = true;
    setStatus('Call ended', 'var(--muted)');
    addBookend('📞 Call Ended');
    setTimeout(() => { location.href = `/summary?callSid=${CALL_SID}`; }, 1500);
  }
}

function applyTaskState(data) {
  if (data.coffee_question_asked) markTask('task-question');
  if (data.coffee_order_placed)   markTask('task-order');
  if (data.world_tour_guessed)    markTask('task-world-tour');
}

function applyHistory(messages) {
  const newMessages = messages.slice(renderedMessageCount);
  for (const m of newMessages) addMessage(m.role, m.text);
  renderedMessageCount = messages.length;
}

function applyViSid(sid) {
  if (!sid || viSid) return;
  viSid = sid;
  viBtn.style.display = 'inline-block';
  footerHint.textContent = '';
}

// ── Voice Intelligence ─────────────────────────────────────────────────────
viBtn.addEventListener('click', async () => {
  if (!viSid) return;
  viPanel.classList.add('open');
  feed.style.display = 'none';
  viIframe.src = `https://intelligence.twilio.com/transcripts/${viSid}`;
});
viClose.addEventListener('click', () => {
  viPanel.classList.remove('open');
  feed.style.display = 'flex';
  viIframe.src = 'about:blank';
});

</script>

<!-- Twilio Sync JS SDK must load before initSync() is called -->
<script src="https://media.twiliocdn.com/sdk/js/sync/releases/3.0.1/twilio-sync.min.js"
        onload="initSync()" onerror="console.error('Sync SDK failed to load')"></script>
</body>
</html>
